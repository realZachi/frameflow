name: Bug report
description: Something isn't working the way it should.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time. Fill in what you know — a short description on its own is already useful, and you can skip anything that doesn't apply.

        Two asks: leave out API keys, private screenshots, and customer data, and report security vulnerabilities privately via `SECURITY.md` rather than here.

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How can we reproduce it?
      description: Rough steps are fine if you can't pin it down exactly.
      placeholder: |
        1. Open ...
        2. Add ...
        3. Click ...

  - type: input
    id: environment
    attributes:
      label: Browser and OS
      placeholder: macOS 15.5, Chrome 138

  - type: dropdown
    id: area
    attributes:
      label: Where does it happen?
      options:
        - Not sure
        - Canvas and element editing
        - Project persistence
        - Uploads and device mockups
        - Export
        - AI generation
        - Setup or build
        - Other

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, recording, or logs
      description: Helpful but optional. Use sample content and redact anything sensitive.
