name: Feature request
description: Something you'd like Frameflow to do.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome, half-formed ones too. If you'd rather just build it, that works as well — a pull request is a fine way to open the conversation.

  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: What's difficult or missing today, and what would make it better? Mockups and examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Anything you've tried instead?
      description: Workarounds or other approaches, if you have any.

  - type: dropdown
    id: area
    attributes:
      label: Which part of Frameflow?
      options:
        - Not sure
        - Canvas and element editing
        - Templates and visual design
        - Project persistence
        - Uploads and device mockups
        - Export
        - AI generation
        - Developer experience
        - Documentation or translation
        - Other

  - type: dropdown
    id: contribution
    attributes:
      label: Would you like to build it yourself?
      options:
        - Haven't decided
        - "Yes"
        - Maybe, with some guidance
        - "No"
