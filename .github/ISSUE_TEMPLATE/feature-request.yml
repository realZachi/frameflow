name: Feature request
description: Suggest an improvement to Frameflow.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Describe the problem before the proposed interface so the community can explore the best solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is difficult today, and who experiences it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain the desired behavior. Mockups or examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Canvas and element editing
        - Templates and visual design
        - Project persistence
        - Uploads and device mockups
        - Export
        - AI generation
        - Developer experience
        - Documentation or translation
        - Other
    validations:
      required: true

  - type: dropdown
    id: contribution
    attributes:
      label: Would you like to work on this?
      options:
        - "Yes"
        - "Maybe, with guidance"
        - "No"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for similar proposals.
          required: true
        - label: I am willing to discuss scope and tradeoffs before implementation.
          required: true
